<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <meta content="no-referrer" name="referrer">
  <link href="data:image/x-icon;," rel="icon">
  <title>ReynielTV - Native HLS IPTV</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.2/controls.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b0f17;
      --panel:#0f1724;
      --panel2:#121d2e;
      --card:rgba(255,255,255,.06);
      --card2:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.10);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.72);
      --muted2:rgba(234,240,255,.55);
      --accent:#61dafb;
      --accent2:#8b5cf6;
      --danger:#ff4d4d;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --shadow2: 0 10px 30px rgba(0,0,0,.35);
      --r12:12px;
      --r16:16px;
      --r20:20px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(1000px 600px at 15% 10%, rgba(139,92,246,.18), transparent 60%),
        radial-gradient(900px 500px at 85% 30%, rgba(97,218,251,.18), transparent 55%),
        linear-gradient(180deg, #070a11 0%, #0b0f17 60%, #070a11 100%);
      color:var(--text);
      overflow:hidden;
    }

    #app-container{
      height:100vh;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:12px;
    }

    #video-container{
      position:relative;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--stroke);
      border-radius: var(--r20);
      box-shadow: var(--shadow);
      overflow:hidden;
      flex-shrink:0;
      height: 40vh;
    }

    #video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }

    #brand-logo{
      position:absolute; top:12px; left:12px;
      z-index:10;
      display:flex; align-items:center; gap:10px;
    }

    #brand-circle{
      width:44px; height:44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display:flex; align-items:center; justify-content:center;
      color:#071018;
      font-weight: 800;
      font-size: 11px;
      line-height: 1.05;
      text-align:center;
      box-shadow: 0 14px 30px rgba(97,218,251,.22), 0 14px 30px rgba(139,92,246,.18);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
    }

    #maximize-btn{
      position:absolute; top:12px; right:12px;
      z-index:10;
      width:44px; height:44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,23,36,.55);
      color: var(--text);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(10px);
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
    }
    #maximize-btn:hover{ background: rgba(15,23,36,.72); border-color: rgba(255,255,255,.22); }
    #maximize-btn:active{ transform: scale(.96); }

    .loading{
      position:absolute; inset:auto auto 14px 14px;
      z-index:11;
      padding:8px 12px;
      border-radius: 999px;
      background: rgba(15,23,36,.55);
      border:1px solid rgba(255,255,255,.14);
      color: var(--accent);
      font-size: 13px;
      backdrop-filter: blur(10px);
    }

    #volume-control{
      position:absolute;
      bottom:16px; right:16px;
      z-index:20;
      display:none;
      flex-direction:column;
      align-items:center;
      gap:8px;
      padding:12px 14px;
      border-radius: 18px;
      background: rgba(15,23,36,.60);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow2);
    }
    #volume-control i{ color: var(--muted); }
    #volume-slider{
      width:120px;
      height:6px;
      -webkit-appearance:none;
      background: rgba(255,255,255,.16);
      border-radius: 999px;
      outline:none;
    }
    #volume-slider::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:16px; height:16px;
      border-radius:999px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border:2px solid rgba(7,16,24,.65);
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(97,218,251,.22);
    }

    #controls-container{
      flex:1;
      background: rgba(15,23,36,.62);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--r20);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height: 0;
      backdrop-filter: blur(12px);
    }

    #channel-info{
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .channel-info-left{ flex:1; min-width:0; }
    #current-channel{
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    #channel-status{
      margin-top:2px;
      font-size: 12px;
      color: var(--muted);
    }
    .player-badge{
      background: rgba(97,218,251,.2);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 8px;
      display: inline-block;
      color: var(--accent);
    }

    .favorite-btn{
      width:42px;height:42px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.70);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      transition: transform .12s ease, background .2s ease, border-color .2s ease, color .2s ease;
    }
    .favorite-btn:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.22); }
    .favorite-btn:active{ transform: scale(.96); }
    .favorite-btn.active{
      color:#0a0f16;
      background: linear-gradient(135deg, #ffb703, #ff6b35);
      border-color: rgba(255,255,255,.20);
    }

    #recent-channels{
      display:none;
      padding: 10px 14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      overflow-x:auto;
      white-space:nowrap;
    }
    #recent-channels::-webkit-scrollbar{ height:6px; }
    #recent-channels::-webkit-scrollbar-thumb{ background: rgba(255,255,255,.18); border-radius:999px; }

    .recent-channel{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      margin-right:8px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color: var(--muted);
      font-size: 12px;
      cursor:pointer;
      transition: transform .12s ease, background .2s ease;
    }
    .recent-channel:active{ transform: scale(.98); background: rgba(255,255,255,.10); }

    #category-tabs{
      display:flex;
      gap:8px;
      padding: 10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      overflow-x:auto;
      background: rgba(255,255,255,.02);
    }
    #category-tabs::-webkit-scrollbar{ height:6px; }
    #category-tabs::-webkit-scrollbar-thumb{ background: rgba(255,255,255,.16); border-radius:999px; }

    .category-tab{
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      color: var(--muted);
      font-size: 12px;
      cursor:pointer;
      white-space:nowrap;
      transition: background .2s ease, border-color .2s ease, color .2s ease, transform .12s ease;
    }
    .category-tab:hover{ background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.18); }
    .category-tab:active{ transform: scale(.98); }
    .category-tab.active{
      color:#071018;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-color: rgba(255,255,255,.18);
      font-weight: 800;
    }

    #nav-buttons{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      padding: 12px;
      flex-shrink:0;
    }

    .nav-btn{
      padding: 12px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(135deg, rgba(139,92,246,.25), rgba(97,218,251,.25));
      color: var(--text);
      font-weight: 800;
      font-size: 13px;
      letter-spacing:.3px;
      cursor:pointer;
      box-shadow: var(--shadow2);
      transition: transform .12s ease, filter .2s ease, background .2s ease;
    }
    .nav-btn:hover{ filter: brightness(1.08); }
    .nav-btn:active{ transform: scale(.98); }

    #quick-channels{
      flex:1;
      min-height:0;
      overflow:auto;
      padding: 10px 12px 12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    #quick-channels::-webkit-scrollbar{ width:10px; }
    #quick-channels::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.14);
      border-radius:999px;
      border:2px solid transparent;
      background-clip: content-box;
    }

    .quick-channel{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      cursor:pointer;
      min-height: 48px;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      position:relative;
      overflow:hidden;
    }
    .quick-channel::before{
      content:"";
      position:absolute; inset:0;
      pointer-events:none;
      opacity:0;
      background: radial-gradient(450px 180px at 30% 20%, rgba(97,218,251,.25), transparent 60%);
      transition: opacity .2s ease;
    }
    .quick-channel:hover::before{ opacity:1; }
    .quick-channel:active{ transform: scale(.98); }
    .quick-channel.active{
      background: rgba(97,218,251,.16);
      border-color: rgba(97,218,251,.30);
    }

    .channel-logo{
      width:28px;height:28px;
      border-radius: 10px;
      object-fit:cover;
      flex-shrink:0;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
    }
    .channel-name{
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      flex:1;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .channel-fav{
      color:#ffb703;
      font-size: 12px;
      margin-left:4px;
    }

    .bottom-actions{
      display:flex;
      gap:10px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      flex-shrink:0;
    }

    #channel-list-btn{
      margin:0;
      flex:1;
      padding: 12px 14px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color:#071018;
      font-weight: 900;
      font-size: 13px;
      letter-spacing:.2px;
      cursor:pointer;
      box-shadow: var(--shadow2);
      transition: transform .12s ease, filter .2s ease;
    }
    #channel-list-btn:hover{ filter: brightness(1.05); }
    #channel-list-btn:active{ transform: scale(.98); }

    #settings-btn{
      padding:0;
      width:52px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow: var(--shadow2);
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
    }
    #settings-btn:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.22); }
    #settings-btn:active{ transform: scale(.98); }

    #channel-overlay{
      position:fixed; inset:0;
      background: rgba(7,10,17,.92);
      backdrop-filter: blur(14px);
      z-index:1001;
      display:none;
      flex-direction:column;
    }

    #channel-header{
      padding: 14px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background: rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    #channel-header h3{
      font-size: 16px;
      letter-spacing: .2px;
    }

    #close-channels{
      background: rgba(255,77,77,.20);
      color: var(--text);
      border:1px solid rgba(255,255,255,.14);
      padding: 10px 14px;
      border-radius: 14px;
      cursor:pointer;
      font-size: 13px;
      font-weight: 800;
      transition: transform .12s ease, background .2s ease;
    }
    #close-channels:hover{ background: rgba(255,77,77,.28); }
    #close-channels:active{ transform: scale(.98); }

    #channel-search{
      width: calc(100% - 24px);
      margin: 12px auto 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color: var(--text);
      outline:none;
      font-size: 14px;
    }
    #channel-search::placeholder{ color: rgba(234,240,255,.45); }

    #channels-list{
      flex:1;
      overflow:auto;
      padding: 12px;
    }

    .channel-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 10px;
      margin-bottom: 10px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      cursor:pointer;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
    }
    .channel-item:hover{ background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.18); }
    .channel-item:active{ transform: scale(.98); }
    .channel-item.active{
      background: rgba(97,218,251,.16);
      border-color: rgba(97,218,251,.30);
    }

    #settings-panel{
      position:fixed;
      top:0;
      right:-320px;
      width:320px;
      max-width: 88vw;
      height:100%;
      background: rgba(15,23,36,.78);
      border-left:1px solid rgba(255,255,255,.10);
      z-index:1002;
      transition:right .28s ease;
      padding: 18px 16px;
      overflow-y:auto;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }
    #settings-panel.open{ right:0; }

    .settings-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .settings-header h3{ font-size: 16px; }

    .settings-option{ margin-bottom: 14px; }
    .settings-label{
      display:block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .settings-select{
      width:100%;
      padding: 10px 12px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      color: var(--text);
      outline:none;
    }

    .toast{
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,23,36,.72);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      z-index: 2000;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow2);
      backdrop-filter: blur(14px);
      animation: fadeInOut 3s ease-in-out;
      max-width: 92vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes fadeInOut{
      0%,100%{opacity:0; transform: translateX(-50%) translateY(-6px);}
      10%,90%{opacity:1; transform: translateX(-50%) translateY(0);}
    }

    .fullscreen #video-container{
      height:100vh;
      position: fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      border-radius: 0;
      border:none;
    }
    .fullscreen #controls-container{ display:none; }
    .fullscreen #maximize-btn{
      top: 18px;
      right: 18px;
      background: rgba(0,0,0,.45);
    }

    @media (min-width: 900px){
      #app-container{
        flex-direction:row;
        gap:14px;
        padding:14px;
      }
      #video-container{
        height: calc(100vh - 28px);
        flex: 0 0 58%;
      }
      #controls-container{
        height: calc(100vh - 28px);
        flex: 1;
      }
      #quick-channels{
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    @media (min-width: 1200px){
      #quick-channels{
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
    }

    @media (max-width: 480px){
      #video-container{
        height: 32vh;
        border-radius: 16px;
      }
      #app-container{
        padding: 10px;
        gap: 10px;
      }
      #channel-info{
        padding: 8px 10px;
        gap: 8px;
      }
      #current-channel{ font-size: 14px; }
      #channel-status{ font-size: 11px; }
      .favorite-btn{
        width: 36px;
        height: 36px;
        border-radius: 12px;
      }
      #recent-channels{ display:none !important; }
      #category-tabs{
        padding: 8px 10px;
        gap: 6px;
      }
      .category-tab{
        padding: 6px 10px;
        font-size: 11px;
      }
      #nav-buttons{
        padding: 10px;
        gap: 8px;
      }
      .nav-btn{
        padding: 10px 10px;
        font-size: 12px;
        border-radius: 12px;
      }
      #quick-channels{
        padding: 8px 10px 10px;
        gap: 8px;
      }
      .quick-channel{
        padding: 8px 8px;
        min-height: 44px;
        border-radius: 12px;
      }
      .channel-logo{
        width: 24px;
        height: 24px;
        border-radius: 8px;
      }
      .channel-name{
        font-size: 11px;
      }
      .bottom-actions{
        padding: 10px;
        gap: 8px;
      }
      #channel-list-btn{
        padding: 10px 12px;
        font-size: 12px;
        border-radius: 12px;
      }
      #settings-btn{
        width: 46px;
        border-radius: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="app-container">
    <div id="video-container">
      <div id="brand-logo">
        <div id="brand-circle">Reyniel<br>TV</div>
      </div>

      <video id="video" controls playsinline crossorigin="anonymous">
        Your browser does not support the video tag.
      </video>

      <button id="maximize-btn">⛶</button>
      <div class="loading" id="loading" style="display: none;">Loading...</div>

      <div id="volume-control">
        <i class="fas fa-volume-up"></i>
        <input type="range" id="volume-slider" min="0" max="100" value="100">
      </div>
    </div>

    <div id="controls-container">
      <div id="channel-info">
        <div class="channel-info-left">
          <div id="current-channel">Select a channel</div>
          <div id="channel-status">Ready</div>
        </div>
        <button class="favorite-btn" id="favorite-btn"><i class="far fa-star"></i></button>
      </div>

      <div id="recent-channels"></div>

      <div id="category-tabs">
        <button class="category-tab active" data-category="all">All Channels</button>
        <button class="category-tab" data-category="favorites">Favorites</button>
      </div>

      <div id="nav-buttons">
        <button class="nav-btn" id="prev-channel">← PREV</button>
        <button class="nav-btn" id="next-channel">NEXT →</button>
      </div>

      <div id="quick-channels"></div>

      <div class="bottom-actions">
        <button id="channel-list-btn" style="flex: 1;">📋 ALL CHANNELS</button>
        <button id="settings-btn">
          <i class="fas fa-cog"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="channel-overlay">
    <div id="channel-header">
      <h3>All Channels</h3>
      <button id="close-channels">Close</button>
    </div>
    <input type="text" id="channel-search" placeholder="Search channels...">
    <div id="channels-list"></div>
  </div>

  <div id="settings-panel">
    <div class="settings-header">
      <h3>Settings</h3>
      <button id="close-settings" style="background: none; border: none; color: white; font-size: 18px; cursor: pointer;">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="settings-option">
      <label class="settings-label">Video Quality</label>
      <select class="settings-select" id="quality-select">
        <option value="auto">Auto</option>
        <option value="hd">HD</option>
        <option value="sd">SD</option>
        <option value="low">Low</option>
      </select>
    </div>

    <div class="settings-option">
      <label class="settings-label">Sleep Timer</label>
      <select class="settings-select" id="sleep-timer">
        <option value="0">Off</option>
        <option value="15">15 minutes</option>
        <option value="30">30 minutes</option>
        <option value="60">1 hour</option>
        <option value="120">2 hours</option>
      </select>
    </div>

    <div class="settings-option">
      <label class="settings-label">Theme</label>
      <select class="settings-select" id="theme-select">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="blue">Blue</option>
      </select>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.2/shaka-player.compiled.js"></script>
  
  <script>
    class ReynielIPTV {
      constructor() {
        this.channels = [];
        this.currentChannelIndex = 0;
        this.hls = null;
        this.shakaPlayer = null;
        this.playerType = null;
        this.favorites = JSON.parse(localStorage.getItem('iptv_favorites') || '[]');
        this.recentChannels = JSON.parse(localStorage.getItem('iptv_recent') || '[]');
        this.categories = { all: [], favorites: [] };
        this.currentCategory = 'all';
        
        this.init();
      }
      
      init() {
        this.video = document.getElementById('video');
        this.initShaka();
        this.setupEvents();
        this.loadPlaylist();
      }
      
      initShaka() {
        if (typeof shaka !== 'undefined') {
          this.shakaPlayer = new shaka.Player(this.video);
          shaka.polyfill.installAll();
        }
      }
      
      setupEvents() {
        document.getElementById('prev-channel').onclick = () => this.prevChannel();
        document.getElementById('next-channel').onclick = () => this.nextChannel();
        document.getElementById('channel-list-btn').onclick = () => this.showChannelList();
        document.getElementById('close-channels').onclick = () => this.hideChannelList();
        document.getElementById('maximize-btn').onclick = () => this.toggleFullscreen();
        document.getElementById('channel-search').oninput = (e) => this.filterChannels(e.target.value);
        document.getElementById('favorite-btn').onclick = () => this.toggleFavorite();
        document.getElementById('settings-btn').onclick = () => this.toggleSettings();
        document.getElementById('close-settings').onclick = () => this.toggleSettings();
        document.getElementById('volume-slider').oninput = (e) => this.video.volume = e.target.value / 100;
        this.video.onclick = () => this.showVolumeControl();
      }
      
      async loadPlaylist() {
        try {
          this.showLoading(true);
          this.updateStatus('Loading playlist...');
          
          // Test M3U8 URL - using a reliable test stream
          const testM3u8 = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
          const response = await fetch(testM3u8);
          
          if (response.ok) {
            const content = await response.text();
            this.parseM3U8(content, testM3u8);
          } else {
            // Fallback: create demo channels
            this.createDemoChannels();
          }
        } catch (error) {
          console.error('Error:', error);
          this.createDemoChannels();
        } finally {
          this.showLoading(false);
        }
      }
      
      parseM3U8(content, baseUrl) {
        const lines = content.split('\n');
        let currentChannel = null;
        
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          
          if (line.startsWith('#EXTINF:')) {
            // Extract channel name
            const nameMatch = line.match(/#EXTINF:.*?,(.*)$/);
            const channelName = nameMatch ? nameMatch[1] : 'Unknown Channel';
            
            // Get URL (next line)
            if (i + 1 < lines.length) {
              const url = lines[i + 1].trim();
              if (url && !url.startsWith('#')) {
                currentChannel = {
                  name: channelName,
                  url: url.startsWith('http') ? url : this.resolveUrl(baseUrl, url),
                  logo: 'https://via.placeholder.com/28/61dafb/071018?text=TV'
                };
                this.channels.push(currentChannel);
              }
            }
          }
        }
        
        if (this.channels.length === 0) {
          this.createDemoChannels();
        } else {
          this.updateUI();
          this.playChannel(0);
        }
      }
      
      resolveUrl(base, relative) {
        try {
          return new URL(relative, base).href;
        } catch {
          return relative;
        }
      }
      
      createDemoChannels() {
        // Demo channels with working M3U8 streams
        this.channels = [
          { name: 'Test Stream 1 (HLS)', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', logo: 'https://via.placeholder.com/28/61dafb/071018?text=TV1' },
          { name: 'Test Stream 2 (HLS)', url: 'https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8', logo: 'https://via.placeholder.com/28/8b5cf6/071018?text=TV2' },
          { name: 'Big Buck Bunny (MP4)', url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4', logo: 'https://via.placeholder.com/28/ff6b35/071018?text=MP4' }
        ];
        
        this.updateUI();
        this.playChannel(0);
        this.showToast('Using demo channels - Add your own M3U playlist URL');
      }
      
      updateUI() {
        this.categories.all = this.channels;
        this.categories.favorites = this.channels.filter((_, i) => this.favorites.includes(i));
        this.renderQuickChannels();
        this.renderChannelList();
        this.updateRecentUI();
      }
      
      renderQuickChannels() {
        const container = document.getElementById('quick-channels');
        const channelsToShow = this.categories[this.currentCategory] || this.channels;
        
        container.innerHTML = channelsToShow.map((ch, idx) => {
          const originalIdx = this.channels.findIndex(c => c.url === ch.url);
          const isActive = originalIdx === this.currentChannelIndex;
          const isFav = this.favorites.includes(originalIdx);
          const isM3u8 = ch.url.includes('.m3u8');
          
          return `
            <div class="quick-channel ${isActive ? 'active' : ''}" data-index="${originalIdx}">
              <img src="${ch.logo}" class="channel-logo" onerror="this.src='https://via.placeholder.com/28/61dafb/071018?text=TV'">
              <span class="channel-name">${ch.name}${isM3u8 ? '<span style="font-size:9px;background:#61dafb20;padding:2px 6px;border-radius:10px;margin-left:4px;">HLS</span>' : ''}</span>
              ${isFav ? '<span class="channel-fav"><i class="fas fa-star"></i></span>' : ''}
            </div>
          `;
        }).join('');
        
        // Add click handlers
        container.querySelectorAll('.quick-channel').forEach(el => {
          el.onclick = () => this.playChannel(parseInt(el.dataset.index));
        });
      }
      
      renderChannelList() {
        const container = document.getElementById('channels-list');
        container.innerHTML = this.channels.map((ch, idx) => `
          <div class="channel-item ${idx === this.currentChannelIndex ? 'active' : ''}" data-index="${idx}">
            <img src="${ch.logo}" class="channel-logo" onerror="this.src='https://via.placeholder.com/28/61dafb/071018?text=TV'">
            <span class="channel-name">${ch.name}</span>
            ${this.favorites.includes(idx) ? '<span class="channel-fav"><i class="fas fa-star"></i></span>' : ''}
          </div>
        `).join('');
        
        container.querySelectorAll('.channel-item').forEach(el => {
          el.onclick = () => {
            this.playChannel(parseInt(el.dataset.index));
            this.hideChannelList();
          };
        });
      }
      
      playChannel(index) {
        if (index < 0 || index >= this.channels.length) return;
        
        this.currentChannelIndex = index;
        const channel = this.channels[index];
        const url = channel.url;
        const isM3u8 = url.includes('.m3u8');
        
        this.destroyPlayer();
        this.addToRecent(index);
        
        document.getElementById('current-channel').textContent = channel.name;
        this.showLoading(true);
        
        if (isM3u8) {
          this.playM3U8(url, channel.name);
        } else {
          this.playWithShaka(url, channel.name);
        }
        
        this.updateFavoriteButton();
        this.renderQuickChannels();
        this.renderChannelList();
      }
      
      playM3U8(url, channelName) {
        // Check for native HLS support
        const video = document.createElement('video');
        const hasNativeHls = video.canPlayType('application/vnd.apple.mpegurl') || 
                            video.canPlayType('application/x-mpegURL');
        
        if (hasNativeHls) {
          // Use native HLS (Safari, modern browsers)
          this.playerType = 'native';
          this.updateStatus('Playing with Native HLS...');
          this.video.src = url;
          this.video.load();
          
          this.video.oncanplay = () => {
            this.showLoading(false);
            this.updateStatus('Playing (Native HLS)');
            this.showToast(`🎬 ${channelName} - Native HLS`);
          };
          
          this.video.onerror = () => {
            console.error('Native HLS failed, trying hls.js');
            this.playM3U8WithHlsJs(url, channelName);
          };
          
          this.video.play().catch(e => {
            console.log('Autoplay prevented:', e);
            this.showLoading(false);
            this.updateStatus('Tap play to start');
          });
        } else {
          this.playM3U8WithHlsJs(url, channelName);
        }
      }
      
      playM3U8WithHlsJs(url, channelName) {
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          this.playerType = 'hlsjs';
          this.updateStatus('Loading with hls.js...');
          
          if (this.hls) this.hls.destroy();
          
          this.hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            maxBufferLength: 30,
            debug: false
          });
          
          this.hls.loadSource(url);
          this.hls.attachMedia(this.video);
          
          this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
            this.showLoading(false);
            this.updateStatus('Playing (hls.js)');
            this.showToast(`🎬 ${channelName} - hls.js`);
            this.video.play().catch(e => console.log('Autoplay prevented'));
          });
          
          this.hls.on(Hls.Events.ERROR, (event, data) => {
            console.error('hls.js error:', data);
            if (data.fatal) {
              this.updateStatus('Playback error');
              this.showToast(`Cannot play: ${channelName}`);
              this.showLoading(false);
            }
          });
        } else {
          this.updateStatus('HLS not supported');
          this.showToast('Your browser does not support HLS playback');
          this.showLoading(false);
        }
      }
      
      playWithShaka(url, channelName) {
        if (this.shakaPlayer) {
          this.playerType = 'shaka';
          this.updateStatus('Loading with Shaka...');
          
          this.shakaPlayer.load(url).then(() => {
            this.showLoading(false);
            this.updateStatus('Playing (Shaka)');
            this.showToast(`📹 ${channelName} - Shaka Player`);
            this.video.play().catch(e => console.log('Autoplay prevented'));
          }).catch(err => {
            console.error('Shaka error:', err);
            this.updateStatus('Failed to play');
            this.showToast('Cannot play this video format');
            this.showLoading(false);
          });
        } else {
          // Last resort: direct src
          this.playerType = 'native';
          this.video.src = url;
          this.video.load();
          this.showLoading(false);
        }
      }
      
      destroyPlayer() {
        if (this.hls) {
          this.hls.destroy();
          this.hls = null;
        }
        if (this.shakaPlayer) {
          try { this.shakaPlayer.unload(); } catch(e) {}
        }
        this.video.pause();
        this.video.removeAttribute('src');
        this.video.load();
      }
      
      addToRecent(index) {
        this.recentChannels = this.recentChannels.filter(i => i !== index);
        this.recentChannels.unshift(index);
        if (this.recentChannels.length > 5) this.recentChannels.pop();
        localStorage.setItem('iptv_recent', JSON.stringify(this.recentChannels));
        this.updateRecentUI();
      }
      
      updateRecentUI() {
        const container = document.getElementById('recent-channels');
        if (this.recentChannels.length === 0) {
          container.style.display = 'none';
          return;
        }
        container.style.display = 'block';
        container.innerHTML = '<span style="margin-right:10px;font-size:11px;color:rgba(234,240,255,.55);">Recent:</span>' +
          this.recentChannels.map(idx => {
            const ch = this.channels[idx];
            return ch ? `<div class="recent-channel" data-index="${idx}"><img src="${ch.logo}" style="width:14px;height:14px;border-radius:6px;"><span>${ch.name}</span></div>` : '';
          }).join('');
        
        container.querySelectorAll('.recent-channel').forEach(el => {
          el.onclick = () => this.playChannel(parseInt(el.dataset.index));
        });
      }
      
      toggleFavorite() {
        const idx = this.currentChannelIndex;
        if (this.favorites.includes(idx)) {
          this.favorites = this.favorites.filter(i => i !== idx);
          this.showToast('Removed from favorites');
        } else {
          this.favorites.push(idx);
          this.showToast('Added to favorites');
        }
        localStorage.setItem('iptv_favorites', JSON.stringify(this.favorites));
        this.categories.favorites = this.channels.filter((_, i) => this.favorites.includes(i));
        this.updateFavoriteButton();
        this.renderQuickChannels();
        this.renderChannelList();
      }
      
      updateFavoriteButton() {
        const btn = document.getElementById('favorite-btn');
        const isFav = this.favorites.includes(this.currentChannelIndex);
        btn.classList.toggle('active', isFav);
        btn.innerHTML = isFav ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
      }
      
      nextChannel() {
        const channels = this.categories[this.currentCategory] || this.channels;
        const currentUrl = this.channels[this.currentChannelIndex]?.url;
        const currentIdx = channels.findIndex(c => c.url === currentUrl);
        const nextIdx = (currentIdx + 1) % channels.length;
        const originalIdx = this.channels.findIndex(c => c.url === channels[nextIdx]?.url);
        if (originalIdx !== -1) this.playChannel(originalIdx);
      }
      
      prevChannel() {
        const channels = this.categories[this.currentCategory] || this.channels;
        const currentUrl = this.channels[this.currentChannelIndex]?.url;
        const currentIdx = channels.findIndex(c => c.url === currentUrl);
        const prevIdx = (currentIdx - 1 + channels.length) % channels.length;
        const originalIdx = this.channels.findIndex(c => c.url === channels[prevIdx]?.url);
        if (originalIdx !== -1) this.playChannel(originalIdx);
      }
      
      switchCategory(category) {
        this.currentCategory = category;
        document.querySelectorAll('.category-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.category === category);
        });
        this.renderQuickChannels();
      }
      
      updateStatus(msg) {
        document.getElementById('channel-status').textContent = msg;
      }
      
      showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
      }
      
      showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }
      
      showChannelList() {
        document.getElementById('channel-overlay').style.display = 'flex';
      }
      
      hideChannelList() {
        document.getElementById('channel-overlay').style.display = 'none';
        document.getElementById('channel-search').value = '';
        this.filterChannels('');
      }
      
      toggleSettings() {
        document.getElementById('settings-panel').classList.toggle('open');
      }
      
      toggleFullscreen() {
        const container = document.getElementById('app-container');
        container.classList.toggle('fullscreen');
        document.getElementById('maximize-btn').textContent = container.classList.contains('fullscreen') ? '⛷' : '⛶';
      }
      
      showVolumeControl() {
        const vc = document.getElementById('volume-control');
        vc.style.display = 'flex';
        setTimeout(() => vc.style.display = 'none', 3000);
      }
      
      filterChannels(term) {
        const items = document.querySelectorAll('.channel-item');
        const lowerTerm = term.toLowerCase();
        items.forEach(item => {
          const name = item.querySelector('.channel-name')?.textContent.toLowerCase() || '';
          item.style.display = name.includes(lowerTerm) ? 'flex' : 'none';
        });
      }
    }
    
    // Initialize app
    let app;
    document.addEventListener('DOMContentLoaded', () => {
      app = new ReynielIPTV();
      
      // Setup category tabs
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.onclick = () => app.switchCategory(tab.dataset.category);
      });
    });
  </script>
</body>
</html>
