<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <meta name="referrer" content="no-referrer">
  <link href="data:image/x-icon;," rel="icon">
  <title>ReynielTV - Pure HLS.js Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    /* Video Container */
    .video-wrapper {
      position: relative;
      background: #000;
      min-height: 300px;
      height: 40vh;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Controls */
    .controls {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: rgba(0,0,0,0.3);
    }

    /* Channel Info Bar */
    .channel-bar {
      background: rgba(255,255,255,0.1);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .channel-name {
      font-size: 18px;
      font-weight: bold;
    }

    .channel-status {
      font-size: 12px;
      color: #4ade80;
      margin-top: 4px;
    }

    .fav-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #ffd700;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Category Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
      padding-bottom: 8px;
    }

    .tab {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      background: #4ade80;
      color: #000;
    }

    /* Navigation Buttons */
    .nav-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .nav-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .nav-btn:active {
      transform: scale(0.98);
    }

    /* Channel Grid */
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .channel-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .channel-card:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.2);
    }

    .channel-card.active {
      background: #4ade80;
      color: #000;
    }

    .channel-card img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .channel-card-name {
      font-size: 12px;
      font-weight: bold;
    }

    /* Loading Overlay */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 12px 24px;
      border-radius: 24px;
      z-index: 1000;
      display: none;
      font-size: 14px;
    }

    /* Settings Panel */
    .settings-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.95);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      transform: translateY(100%);
      transition: transform 0.3s;
      z-index: 1001;
    }

    .settings-panel.open {
      transform: translateY(0);
    }

    .settings-option {
      margin-bottom: 16px;
    }

    .settings-option label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .settings-option select,
    .settings-option input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .close-settings {
      background: #ff4444;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      margin-top: 16px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 2000;
      animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
      
      .channel-card {
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="video-wrapper">
      <video id="video" controls playsinline></video>
      <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i> Loading...
      </div>
    </div>

    <div class="controls">
      <div class="channel-bar">
        <div>
          <div class="channel-name" id="channelName">Select Channel</div>
          <div class="channel-status" id="channelStatus">Ready</div>
        </div>
        <button class="fav-btn" id="favBtn">
          <i class="far fa-star"></i>
        </button>
      </div>

      <div class="tabs" id="tabs">
        <button class="tab active" data-category="all">All Channels</button>
        <button class="tab" data-category="favorites">Favorites</button>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">
          <i class="fas fa-chevron-left"></i> PREV
        </button>
        <button class="nav-btn" id="nextBtn">
          NEXT <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <div class="channel-grid" id="channelGrid"></div>

      <button id="settingsBtn" style="margin-top: 16px; width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; cursor: pointer;">
        <i class="fas fa-cog"></i> Settings
      </button>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <h3 style="margin-bottom: 16px;">Settings</h3>
    <div class="settings-option">
      <label>HLS Quality</label>
      <select id="qualitySelect">
        <option value="auto">Auto</option>
        <option value="highest">Highest Quality</option>
        <option value="lowest">Lowest Quality</option>
      </select>
    </div>
    <div class="settings-option">
      <label>Playlist URL</label>
      <input type="text" id="playlistUrl" placeholder="https://your-playlist-url.m3u">
      <button id="loadPlaylistBtn" style="margin-top: 8px; padding: 8px; background: #4ade80; border: none; border-radius: 8px; cursor: pointer; width: 100%;">
        Load Playlist
      </button>
    </div>
    <button class="close-settings" id="closeSettings">Close</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://dbghelp.github.io/M3U8Interpreter.js"></script>

  <script>
    class ReynielTV {
      constructor() {
        this.channels = [];
        this.currentIndex = 0;
        this.favorites = JSON.parse(localStorage.getItem('reyniel_favorites') || '[]');
        this.hls = null;
        this.currentCategory = 'all';
        
        this.init();
      }

      init() {
        this.video = document.getElementById('video');
        this.setupEventListeners();
        this.loadDefaultPlaylist();
      }

      setupEventListeners() {
        document.getElementById('prevBtn').onclick = () => this.prevChannel();
        document.getElementById('nextBtn').onclick = () => this.nextChannel();
        document.getElementById('favBtn').onclick = () => this.toggleFavorite();
        document.getElementById('settingsBtn').onclick = () => this.toggleSettings();
        document.getElementById('closeSettings').onclick = () => this.toggleSettings();
        document.getElementById('loadPlaylistBtn').onclick = () => this.loadCustomPlaylist();
        
        // Quality selector
        document.getElementById('qualitySelect').onchange = () => this.changeQuality();
        
        // Category tabs
        document.querySelectorAll('.tab').forEach(tab => {
          tab.onclick = () => {
            this.currentCategory = tab.dataset.category;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            this.renderChannels();
          };
        });
      }

      async loadDefaultPlaylist() {
        this.showLoading(true);
        try {
          // Default playlist URL
          const defaultUrl = 'https://Niel01581.github.io/secret/playlist.m3u';
          await this.loadPlaylist(defaultUrl);
        } catch (error) {
          console.error('Error loading playlist:', error);
          this.showToast('Failed to load playlist, using test channels');
          this.addTestChannels();
        }
        this.showLoading(false);
      }

      async loadCustomPlaylist() {
        const url = document.getElementById('playlistUrl').value.trim();
        if (!url) {
          this.showToast('Please enter a playlist URL');
          return;
        }
        
        this.showLoading(true);
        try {
          await this.loadPlaylist(url);
          this.showToast(`Loaded ${this.channels.length} channels`);
          this.toggleSettings();
        } catch (error) {
          console.error('Error:', error);
          this.showToast('Failed to load playlist');
        }
        this.showLoading(false);
      }

      async loadPlaylist(url) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Failed to fetch playlist');
          
          const content = await response.text();
          this.parsePlaylist(content);
        } catch (error) {
          console.error('Load error:', error);
          throw error;
        }
      }

      parsePlaylist(content) {
        try {
          const interpreter = new M3U8Interpreter(content);
          interpreter.parse();
          this.channels = interpreter.getChannels();
          
          if (!this.channels || this.channels.length === 0) {
            throw new Error('No channels found');
          }
          
          // Add group titles as categories
          this.extractCategories();
          
          this.renderChannels();
          
          if (this.channels.length > 0) {
            this.playChannel(0);
          }
        } catch (error) {
          console.error('Parse error:', error);
          this.addTestChannels();
        }
      }

      extractCategories() {
        // Add group categories to tabs
        const categories = new Set();
        this.channels.forEach(channel => {
          if (channel.groupTitle) {
            categories.add(channel.groupTitle);
          }
        });
        
        const tabsContainer = document.getElementById('tabs');
        categories.forEach(cat => {
          const existingTab = Array.from(tabsContainer.children).find(
            tab => tab.textContent === cat
          );
          if (!existingTab && cat !== 'All Channels' && cat !== 'Favorites') {
            const tab = document.createElement('button');
            tab.className = 'tab';
            tab.textContent = cat;
            tab.dataset.category = cat;
            tab.onclick = () => {
              this.currentCategory = cat;
              document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
              tab.classList.add('active');
              this.renderChannels();
            };
            tabsContainer.appendChild(tab);
          }
        });
      }

      addTestChannels() {
        // Working test streams
        this.channels = [
          {
            channelName: "🎬 Test Stream 1 (Mux)",
            manifestUrl: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
            tvgLogo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234ade80'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3C/svg%3E",
            groupTitle: "Test"
          },
          {
            channelName: "🎬 Test Stream 2 (Sintel)",
            manifestUrl: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8",
            tvgLogo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3C/svg%3E",
            groupTitle: "Test"
          },
          {
            channelName: "🎬 Big Buck Bunny",
            manifestUrl: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
            tvgLogo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f59e0b'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3C/svg%3E",
            groupTitle: "Test"
          }
        ];
        this.renderChannels();
        if (this.channels.length > 0) {
          this.playChannel(0);
        }
      }

      playChannel(index) {
        if (index < 0 || index >= this.channels.length) return;
        
        this.currentIndex = index;
        const channel = this.channels[index];
        const url = channel.manifestUrl;
        
        // Update UI
        document.getElementById('channelName').textContent = channel.channelName;
        this.showLoading(true);
        
        // Destroy existing HLS instance
        if (this.hls) {
          this.hls.destroy();
          this.hls = null;
        }
        
        // Check if it's an M3U8 stream
        const isM3U8 = url.toLowerCase().includes('.m3u8');
        
        if (isM3U8 && Hls.isSupported()) {
          this.playWithHLS(url);
        } else {
          this.playWithNative(url);
        }
        
        this.renderChannels();
        this.updateFavoriteButton();
      }

      playWithHLS(url) {
        this.hls = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 6,
          startLevel: -1 // Auto quality
        });
        
        this.hls.loadSource(url);
        this.hls.attachMedia(this.video);
        
        this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
          this.showLoading(false);
          document.getElementById('channelStatus').innerHTML = '<i class="fas fa-play"></i> Playing (HLS)';
          this.video.play().catch(e => {
            console.log('Autoplay blocked:', e);
            document.getElementById('channelStatus').innerHTML = '<i class="fas fa-pause"></i> Click play to start';
          });
        });
        
        this.hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
          const level = this.hls.levels[data.level];
          if (level) {
            console.log(`Quality: ${level.height}p`);
          }
        });
        
        this.hls.on(Hls.Events.ERROR, (event, data) => {
          console.error('HLS Error:', data);
          
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                this.showLoading(false);
                document.getElementById('channelStatus').innerHTML = '<i class="fas fa-wifi"></i> Network error, retrying...';
                setTimeout(() => {
                  if (this.hls) this.hls.startLoad();
                }, 2000);
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                this.showLoading(false);
                document.getElementById('channelStatus').innerHTML = '<i class="fas fa-sync"></i> Recovering...';
                if (this.hls) this.hls.recoverMediaError();
                break;
              default:
                this.showLoading(false);
                document.getElementById('channelStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Playback error';
                this.showToast('Failed to play stream');
                break;
            }
          }
        });
        
        // Handle video events
        this.video.onplaying = () => {
          this.showLoading(false);
          document.getElementById('channelStatus').innerHTML = '<i class="fas fa-play"></i> Playing (HLS)';
        };
        
        this.video.onwaiting = () => {
          this.showLoading(true);
          document.getElementById('channelStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buffering...';
        };
      }

      playWithNative(url) {
        this.video.src = url;
        this.video.load();
        
        this.video.oncanplay = () => {
          this.showLoading(false);
          document.getElementById('channelStatus').innerHTML = '<i class="fas fa-play"></i> Playing';
          this.video.play().catch(e => {
            console.log('Autoplay blocked:', e);
          });
        };
        
        this.video.onerror = (e) => {
          console.error('Video Error:', e);
          this.showLoading(false);
          document.getElementById('channelStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error';
          this.showToast('Cannot play this stream');
        };
      }

      changeQuality() {
        if (!this.hls) return;
        
        const quality = document.getElementById('qualitySelect').value;
        if (quality === 'auto') {
          this.hls.currentLevel = -1;
          this.showToast('Auto quality enabled');
        } else if (quality === 'highest') {
          this.hls.currentLevel = this.hls.levels.length - 1;
          this.showToast('Highest quality');
        } else if (quality === 'lowest') {
          this.hls.currentLevel = 0;
          this.showToast('Lowest quality');
        }
      }

      renderChannels() {
        const grid = document.getElementById('channelGrid');
        grid.innerHTML = '';
        
        let channelsToShow = this.channels;
        if (this.currentCategory === 'favorites') {
          channelsToShow = this.channels.filter((_, i) => this.favorites.includes(i));
        } else if (this.currentCategory !== 'all') {
          channelsToShow = this.channels.filter(c => c.groupTitle === this.currentCategory);
        }
        
        if (channelsToShow.length === 0) {
          grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">
              <i class="fas fa-tv"></i><br>
              No channels found
            </div>
          `;
          return;
        }
        
        channelsToShow.forEach((channel, idx) => {
          const originalIndex = this.channels.findIndex(c => c.manifestUrl === channel.manifestUrl);
          const isActive = originalIndex === this.currentIndex;
          const isFavorite = this.favorites.includes(originalIndex);
          
          const card = document.createElement('div');
          card.className = `channel-card ${isActive ? 'active' : ''}`;
          card.innerHTML = `
            <img src="${channel.tvgLogo || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23666\'%3E%3Crect width=\'24\' height=\'24\'/%3E%3C/svg%3E'}" 
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23666\'%3E%3Crect width=\'24\' height=\'24\'/%3E%3C/svg%3E'">
            <div class="channel-card-name">${this.escapeHtml(channel.channelName)}</div>
            ${isFavorite ? '<div style="font-size: 10px; color: #ffd700;"><i class="fas fa-star"></i></div>' : ''}
          `;
          card.onclick = () => this.playChannel(originalIndex);
          grid.appendChild(card);
        });
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      toggleFavorite() {
        const index = this.currentIndex;
        if (this.favorites.includes(index)) {
          this.favorites = this.favorites.filter(i => i !== index);
          this.showToast('Removed from favorites');
        } else {
          this.favorites.push(index);
          this.showToast('Added to favorites');
        }
        localStorage.setItem('reyniel_favorites', JSON.stringify(this.favorites));
        this.updateFavoriteButton();
        this.renderChannels();
      }

      updateFavoriteButton() {
        const btn = document.getElementById('favBtn');
        const isFavorite = this.favorites.includes(this.currentIndex);
        btn.innerHTML = isFavorite ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
      }

      nextChannel() {
        const next = (this.currentIndex + 1) % this.channels.length;
        this.playChannel(next);
      }

      prevChannel() {
        const prev = (this.currentIndex - 1 + this.channels.length) % this.channels.length;
        this.playChannel(prev);
      }

      toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('open');
      }

      showLoading(show) {
        const loadingEl = document.getElementById('loading');
        loadingEl.style.display = show ? 'flex' : 'none';
      }

      showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
      }
    }

    // Start the app
    const app = new ReynielTV();
  </script>
</body>
</html>
