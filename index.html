<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <meta name="referrer" content="no-referrer">
  <link href="data:image/x-icon;," rel="icon">
  <title>ReynielTV - Fixed HLS Player</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.2/controls.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    /* Video Container */
    .video-wrapper {
      position: relative;
      background: #000;
      min-height: 300px;
      height: 40vh;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Controls */
    .controls {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: rgba(0,0,0,0.3);
    }

    /* Channel Info Bar */
    .channel-bar {
      background: rgba(255,255,255,0.1);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .channel-name {
      font-size: 18px;
      font-weight: bold;
    }

    .channel-status {
      font-size: 12px;
      color: #4ade80;
      margin-top: 4px;
    }

    .fav-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #ffd700;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Category Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
      padding-bottom: 8px;
    }

    .tab {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      background: #4ade80;
      color: #000;
    }

    /* Navigation Buttons */
    .nav-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .nav-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Channel Grid */
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .channel-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.2s;
      text-align: center;
    }

    .channel-card:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.2);
    }

    .channel-card.active {
      background: #4ade80;
      color: #000;
    }

    .channel-card img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .channel-card-name {
      font-size: 12px;
      font-weight: bold;
    }

    /* Loading Overlay */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 24px;
      border-radius: 24px;
      z-index: 1000;
      display: none;
    }

    /* Settings Panel */
    .settings-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.95);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      transform: translateY(100%);
      transition: transform 0.3s;
      z-index: 1001;
    }

    .settings-panel.open {
      transform: translateY(0);
    }

    .settings-option {
      margin-bottom: 16px;
    }

    .settings-option label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .settings-option select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .close-settings {
      background: #ff4444;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      margin-top: 16px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 2000;
      animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
      
      .channel-card {
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="video-wrapper">
      <video id="video" controls playsinline></video>
      <div class="loading" id="loading">Loading...</div>
    </div>

    <div class="controls">
      <div class="channel-bar">
        <div>
          <div class="channel-name" id="channelName">Select Channel</div>
          <div class="channel-status" id="channelStatus">Ready</div>
        </div>
        <button class="fav-btn" id="favBtn">⭐</button>
      </div>

      <div class="tabs" id="tabs">
        <button class="tab active" data-category="all">All Channels</button>
        <button class="tab" data-category="favorites">Favorites</button>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">← Previous</button>
        <button class="nav-btn" id="nextBtn">Next →</button>
      </div>

      <div class="channel-grid" id="channelGrid"></div>

      <button id="settingsBtn" style="margin-top: 16px; width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; cursor: pointer;">
        ⚙️ Settings
      </button>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <h3 style="margin-bottom: 16px;">Settings</h3>
    <div class="settings-option">
      <label>Player Type</label>
      <select id="playerType">
        <option value="auto">Auto (Recommended)</option>
        <option value="hlsjs">hls.js (For M3U8)</option>
        <option value="native">Native Player</option>
      </select>
    </div>
    <div class="settings-option">
      <label>Playlist URL</label>
      <input type="text" id="playlistUrl" placeholder="Enter M3U playlist URL" style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
      <button id="loadPlaylistBtn" style="margin-top: 8px; padding: 8px; background: #4ade80; border: none; border-radius: 8px; cursor: pointer;">Load Playlist</button>
    </div>
    <button class="close-settings" id="closeSettings">Close</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://dbghelp.github.io/M3U8Interpreter.js"></script>

  <script>
    class IPTVPlayer {
      constructor() {
        this.channels = [];
        this.currentIndex = 0;
        this.favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        this.hls = null;
        this.currentCategory = 'all';
        
        this.init();
      }

      init() {
        this.video = document.getElementById('video');
        this.setupEventListeners();
        this.loadDefaultPlaylist();
      }

      setupEventListeners() {
        document.getElementById('prevBtn').onclick = () => this.prevChannel();
        document.getElementById('nextBtn').onclick = () => this.nextChannel();
        document.getElementById('favBtn').onclick = () => this.toggleFavorite();
        document.getElementById('settingsBtn').onclick = () => this.toggleSettings();
        document.getElementById('closeSettings').onclick = () => this.toggleSettings();
        document.getElementById('loadPlaylistBtn').onclick = () => this.loadCustomPlaylist();
        
        // Category tabs
        document.querySelectorAll('.tab').forEach(tab => {
          tab.onclick = () => {
            this.currentCategory = tab.dataset.category;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            this.renderChannels();
          };
        });
      }

      async loadDefaultPlaylist() {
        this.showLoading(true);
        try {
          // Default playlist URL - change this to your playlist
          const defaultUrl = 'https://Niel01581.github.io/secret/playlist.m3u';
          await this.loadPlaylist(defaultUrl);
        } catch (error) {
          console.error('Error loading playlist:', error);
          this.showToast('Failed to load default playlist');
          // Add sample channels for testing
          this.addSampleChannels();
        }
        this.showLoading(false);
      }

      async loadCustomPlaylist() {
        const url = document.getElementById('playlistUrl').value;
        if (!url) {
          this.showToast('Please enter a playlist URL');
          return;
        }
        this.showLoading(true);
        await this.loadPlaylist(url);
        this.showLoading(false);
        this.toggleSettings();
      }

      async loadPlaylist(url) {
        try {
          const response = await fetch(url);
          const content = await response.text();
          this.parsePlaylist(content);
          this.showToast(`Loaded ${this.channels.length} channels`);
        } catch (error) {
          console.error('Error:', error);
          this.showToast('Failed to load playlist');
          throw error;
        }
      }

      parsePlaylist(content) {
        try {
          const interpreter = new M3U8Interpreter(content);
          interpreter.parse();
          this.channels = interpreter.getChannels();
          
          if (this.channels.length === 0) {
            this.addSampleChannels();
          }
          
          this.renderChannels();
          
          if (this.channels.length > 0) {
            this.playChannel(0);
          }
        } catch (error) {
          console.error('Parse error:', error);
          this.addSampleChannels();
        }
      }

      addSampleChannels() {
        // Sample test channels that actually work
        this.channels = [
          {
            channelName: "Test Stream 1",
            manifestUrl: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
            tvgLogo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234ade80'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3C/svg%3E"
          },
          {
            channelName: "Test Stream 2",
            manifestUrl: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8",
            tvgLogo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3C/svg%3E"
          },
          {
            channelName: "Big Buck Bunny",
            manifestUrl: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
            tvgLogo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f59e0b'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3C/svg%3E"
          }
        ];
        this.renderChannels();
        if (this.channels.length > 0) {
          this.playChannel(0);
        }
      }

      playChannel(index) {
        if (index < 0 || index >= this.channels.length) return;
        
        this.currentIndex = index;
        const channel = this.channels[index];
        const url = channel.manifestUrl;
        
        this.showLoading(true);
        document.getElementById('channelName').textContent = channel.channelName;
        
        // Clean up previous HLS instance
        if (this.hls) {
          this.hls.destroy();
          this.hls = null;
        }
        
        const playerType = document.getElementById('playerType').value;
        
        // Check if it's an M3U8 URL
        const isM3U8 = url.toLowerCase().includes('.m3u8');
        
        if (isM3U8 && (playerType === 'auto' || playerType === 'hlsjs')) {
          this.playWithHLS(url);
        } else {
          this.playWithNative(url);
        }
        
        this.renderChannels();
        this.updateFavoriteButton();
      }

      playWithHLS(url) {
        if (Hls.isSupported()) {
          this.hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            maxBufferLength: 30,
            maxMaxBufferLength: 60
          });
          
          this.hls.loadSource(url);
          this.hls.attachMedia(this.video);
          
          this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
            this.showLoading(false);
            document.getElementById('channelStatus').textContent = 'Playing (HLS)';
            this.video.play().catch(e => console.log('Autoplay blocked:', e));
          });
          
          this.hls.on(Hls.Events.ERROR, (event, data) => {
            console.error('HLS Error:', data);
            if (data.fatal) {
              this.showLoading(false);
              document.getElementById('channelStatus').textContent = 'Error playing stream';
              this.showToast('Failed to play stream');
            }
          });
        } else {
          this.playWithNative(url);
        }
      }

      playWithNative(url) {
        this.video.src = url;
        this.video.load();
        
        this.video.addEventListener('canplay', () => {
          this.showLoading(false);
          document.getElementById('channelStatus').textContent = 'Playing';
          this.video.play().catch(e => console.log('Autoplay blocked:', e));
        });
        
        this.video.addEventListener('error', (e) => {
          console.error('Video Error:', e);
          this.showLoading(false);
          document.getElementById('channelStatus').textContent = 'Error';
          this.showToast('Cannot play this stream');
        });
      }

      renderChannels() {
        const grid = document.getElementById('channelGrid');
        grid.innerHTML = '';
        
        let channelsToShow = this.channels;
        if (this.currentCategory === 'favorites') {
          channelsToShow = this.channels.filter((_, i) => this.favorites.includes(i));
        }
        
        if (channelsToShow.length === 0) {
          grid.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">No channels</div>';
          return;
        }
        
        channelsToShow.forEach((channel, idx) => {
          const originalIndex = this.channels.findIndex(c => c.manifestUrl === channel.manifestUrl);
          const isActive = originalIndex === this.currentIndex;
          const isFavorite = this.favorites.includes(originalIndex);
          
          const card = document.createElement('div');
          card.className = `channel-card ${isActive ? 'active' : ''}`;
          card.innerHTML = `
            <img src="${channel.tvgLogo}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23666\'%3E%3Crect width=\'24\' height=\'24\'/%3E%3C/svg%3E'">
            <div class="channel-card-name">${channel.channelName}</div>
            ${isFavorite ? '<div style="font-size: 10px; color: #ffd700;">★</div>' : ''}
          `;
          card.onclick = () => this.playChannel(originalIndex);
          grid.appendChild(card);
        });
      }

      toggleFavorite() {
        const index = this.currentIndex;
        if (this.favorites.includes(index)) {
          this.favorites = this.favorites.filter(i => i !== index);
          this.showToast('Removed from favorites');
        } else {
          this.favorites.push(index);
          this.showToast('Added to favorites');
        }
        localStorage.setItem('favorites', JSON.stringify(this.favorites));
        this.updateFavoriteButton();
        this.renderChannels();
      }

      updateFavoriteButton() {
        const btn = document.getElementById('favBtn');
        const isFavorite = this.favorites.includes(this.currentIndex);
        btn.textContent = isFavorite ? '★' : '☆';
      }

      nextChannel() {
        const next = (this.currentIndex + 1) % this.channels.length;
        this.playChannel(next);
      }

      prevChannel() {
        const prev = (this.currentIndex - 1 + this.channels.length) % this.channels.length;
        this.playChannel(prev);
      }

      toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('open');
      }

      showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
      }

      showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }
    }

    // Start the app
    const app = new IPTVPlayer();
  </script>
</body>
</html>
